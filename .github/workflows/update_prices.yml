name: Обновление цен на топливо

on:
  schedule:
    # Средние цены по сетям — раз в день в 07:00 МСК (04:00 UTC)
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      skip_parser:
        description: 'Пропустить parser.py'
        required: false
        default: 'false'

jobs:
  update-prices:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Кэш зависимостей pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Обновить средние цены по брендам (parser.py)
        if: ${{ github.event.inputs.skip_parser != 'true' && (github.event.schedule == '0 4 * * *' || github.event_name == 'workflow_dispatch') }}
        env:
          JSONBIN_BIN_ID:   ${{ secrets.JSONBIN_BIN_ID }}
          JSONBIN_API_KEY:  ${{ secrets.JSONBIN_API_KEY }}
          PYTHONIOENCODING: utf-8
          PYTHONUTF8:       "1"
        run: python parser.py

      # fetch_per_station_prices.py не запускается здесь:
      # gpnbonus.ru блокирует GitHub Actions по IP.
      # Обновление station_prices.json идёт через локальный Task Scheduler (update_gpn_prices.ps1).

      - name: Сохранить обновлённые файлы в репозиторий
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet && echo "Данные не изменились, коммит не нужен" || \
            git commit -m "Автообновление цен $(date +'%d.%m.%Y %H:%M UTC')"
          for i in 1 2 3; do
            git pull --rebase -X ours
            if git push; then
              echo "Push успешен с попытки $i"
              break
            elif [ "$i" -eq 3 ]; then
              echo "Не удалось запушить после 3 попыток"
              exit 1
            fi
            echo "Попытка $i не удалась, повтор через 5 сек..."
            sleep 5
          done
