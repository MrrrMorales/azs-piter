name: Обновление цен на топливо

on:
  schedule:
    # Каждый день в 07:00 по московскому времени (04:00 UTC)
    - cron: '0 4 * * *'
  workflow_dispatch:  # Кнопка ручного запуска в интерфейсе GitHub

jobs:
  parse-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установить зависимости
        run: pip install requests beautifulsoup4 lxml

      - name: Запустить парсер
        run: python parser.py

      - name: Сохранить prices.json в репозиторий
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "🔄 Автообновление цен $(date +'%d.%m.%Y %H:%M')"
          git push
