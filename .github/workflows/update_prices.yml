name: Обновление цен на топливо

on:
  schedule:
    # Каждый день в 07:00 по московскому времени (04:00 UTC)
    - cron: '0 4 * * *'
  workflow_dispatch:  # Кнопка ручного запуска в интерфейсе GitHub

jobs:
  parse-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Кэш зависимостей pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Запустить парсер
        env:
          JSONBIN_BIN_ID:   ${{ secrets.JSONBIN_BIN_ID }}
          JSONBIN_API_KEY:  ${{ secrets.JSONBIN_API_KEY }}
          PYTHONIOENCODING: utf-8
          PYTHONUTF8:       "1"
        run: python parser.py

      - name: Сохранить prices.json в репозиторий
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet && echo "Цены не изменились, коммит не нужен" || git commit -m "Автообновление цен $(date +'%d.%m.%Y %H:%M')"
          for i in 1 2 3; do
            git pull --rebase -X ours && git push && break
            echo "Попытка $i не удалась, повтор через 5 сек..."
            sleep 5
          done
